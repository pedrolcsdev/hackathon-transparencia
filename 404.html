<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página indisponível - Portal da Transparência</title>
    <link rel="shortcut icon" href="https://transparencia.ma.gov.br/theme-wp/assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ma-vermelho: #F21326;
            --ma-azul: #034C8C;
            --ma-verde: #03A62C;
            --ma-amarelo: #F29F05;
            --ma-laranja: #F27405;
            --texto: #102a43;
            --texto-suave: #52616f;
            --fundo: #f7f8f5;
            --borda: rgba(3, 76, 140, 0.14);
            --sombra: 0 24px 64px rgba(16, 42, 67, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 103px 28px 28px;
            font-family: 'Montserrat', Arial, Helvetica, sans-serif;
            color: var(--texto);
            background:
                linear-gradient(120deg, rgba(3, 76, 140, 0.08), rgba(3, 166, 44, 0.08)),
                var(--fundo);
        }

        .cabecalhoPortalNovo {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            width: 100%;
            height: 75px;
            background: #fff;
            border-bottom: 1px solid rgba(0, 0, 0, 0.12);
        }

        .cabecalhoPortalNovoConteudo {
            width: min(1630px, 86%);
            height: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
        }

        .cabecalhoMenuBotao {
            width: 34px;
            height: 34px;
            padding: 0;
            border: 0;
            background: transparent;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            flex: 0 0 auto;
        }

        .cabecalhoMenuBotao span {
            display: block;
            width: 30px;
            height: 3px;
            background: #111;
        }

        .cabecalhoLogo {
            margin-left: clamp(80px, 12vw, 218px);
            display: inline-flex;
            align-items: center;
            flex: 0 0 auto;
        }

        .cabecalhoLogo img {
            display: block;
            width: 158px;
            height: auto;
        }

        .cabecalhoNavegacao {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: clamp(28px, 3.2vw, 58px);
            white-space: nowrap;
        }

        .cabecalhoNavegacao a {
            color: #000;
            text-decoration: none;
            font-size: 16px;
            line-height: 1;
            font-weight: 700;
            transition: color 0.18s ease;
        }

        .cabecalhoNavegacao a:hover {
            color: var(--ma-azul);
        }

        .erroCard {
            width: min(920px, 100%);
            min-height: calc(100vh - 131px);
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border-radius: 26px;
            border: 1px solid var(--borda);
            background: #fff;
            box-shadow: var(--sombra);
        }

        .faixaCores {
            height: 10px;
            background: linear-gradient(90deg, var(--ma-vermelho) 0 20%, var(--ma-azul) 20% 40%, var(--ma-verde) 40% 60%, var(--ma-amarelo) 60% 80%, var(--ma-laranja) 80% 100%);
        }

        .erroConteudo {
            position: relative;
            padding: clamp(28px, 6vw, 64px);
        }

        .erroConteudo::after {
            content: "";
            position: absolute;
            width: 260px;
            height: 260px;
            right: -90px;
            top: -90px;
            border-radius: 50%;
            background: rgba(242, 19, 38, 0.08);
        }

        .tagErro {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            color: var(--ma-azul);
            background: rgba(3, 76, 140, 0.08);
            border: 1px solid rgba(3, 76, 140, 0.14);
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        h1 {
            position: relative;
            z-index: 1;
            margin: 18px 0 12px;
            max-width: 720px;
            color: var(--ma-azul);
            font-size: clamp(38px, 7vw, 76px);
            line-height: 0.98;
        }

        p {
            position: relative;
            z-index: 1;
            max-width: 650px;
            margin: 0;
            color: var(--texto-suave);
            font-size: 18px;
            line-height: 1.7;
        }

        .acoesErro {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
        }

        .botaoErro {
            min-height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid var(--borda);
            text-decoration: none;
            font-weight: 800;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .botaoErroPrimario {
            color: #fff;
            background: var(--ma-azul);
        }

        .botaoErro:hover,
        .botaoErro:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(16, 42, 67, 0.14);
            outline: 3px solid rgba(242, 159, 5, 0.6);
            outline-offset: 3px;
        }

        .statusErro {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-top: 34px;
        }

        .statusErro span {
            min-height: 78px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            border-radius: 16px;
            color: var(--texto);
            background: #f8fafc;
            border: 1px solid var(--borda);
            font-weight: 700;
        }

        .statusErro i {
            color: var(--ma-verde);
        }

        @media (max-width: 1024px) {
            .cabecalhoPortalNovoConteudo {
                width: 90%;
            }

            .cabecalhoLogo {
                margin-left: clamp(32px, 8vw, 86px);
            }

            .cabecalhoNavegacao {
                gap: 24px;
            }

            .cabecalhoNavegacao a {
                font-size: 14px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 90px 18px 18px;
            }

            .cabecalhoPortalNovo {
                height: 72px;
            }

            .cabecalhoPortalNovoConteudo {
                width: 90%;
            }

            .cabecalhoLogo {
                margin-left: auto;
                margin-right: auto;
            }

            .cabecalhoLogo img {
                width: 146px;
            }

            .cabecalhoNavegacao {
                display: none;
            }

            .erroCard {
                border-radius: 20px;
                min-height: auto;
            }

            .acoesErro {
                display: grid;
            }

            .botaoErro {
                width: 100%;
            }

            .statusErro {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="cabecalhoPortalNovo">
        <div class="cabecalhoPortalNovoConteudo">
            <button class="cabecalhoMenuBotao" type="button" aria-label="Abrir menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <a class="cabecalhoLogo" href="index.html">
                <img src="images/logoportal.png" alt="Portal da Transparência do Governo do Maranhão">
            </a>
            <nav class="cabecalhoNavegacao" aria-label="Navegação principal">
                <a href="index.html#jornadas">Comece aqui</a>
                <a href="index.html#pesquisar">Buscar no portal</a>
                <a href="index.html#consultas-tematicas">Buscar por assunto</a>
                <a href="404.html">Dados abertos</a>
            </nav>
        </div>
    </header>

    <main class="erroCard" aria-labelledby="titulo-erro">
        <div class="faixaCores" aria-hidden="true"></div>
        <section class="erroConteudo">
            <span class="tagErro"><i class="fa-solid fa-screwdriver-wrench"></i> Página indisponível</span>
            <h1 id="titulo-erro">404</h1>
            <p>Esta área ainda não está pronta. Estamos organizando as informações para publicar em breve.</p>

            <div class="acoesErro">
                <a class="botaoErro botaoErroPrimario" href="index.html"><i class="fa-solid fa-house"></i> Voltar para o início</a>
            </div>

            <div class="statusErro" aria-label="Situação da página">
                <span><i class="fa-solid fa-circle-check"></i> Página em preparação</span>
                <span><i class="fa-solid fa-circle-check"></i> Informações sendo organizadas</span>
                <span><i class="fa-solid fa-circle-check"></i> Novas áreas em construção</span>
            </div>
        </section>
    </main>
</body>
</html>
